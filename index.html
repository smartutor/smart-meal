<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>思馬特訂餐系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║          🌸 思馬特訂餐系統 — 個人設定區                        ║
   ║  只需要修改這個區域，不用動下面的程式碼！                         ║
   ╚══════════════════════════════════════════════════════════════╝ */

const CONFIG = {

  /* ── 系統名稱 ── */
  systemName:   "思馬特訂餐系統",
  systemSlogan: "每一餐，都是愛 🍱",

  /* ── 管理員預設密碼（第一次用完請到「設定」頁更改）── */
  defaultPassword: "smart2025",

  /* ── 封面圖片（貓狗照、班級照都可以放這裡）──
     把圖片上傳到網路後，把網址貼到下面兩個引號之間
     留空白就顯示預設漸層背景                         */
  coverImageUrl: "",

  /* ── Logo 圖片網址 ──
     把你的 Logo 上傳後貼網址，留空則顯示文字 Logo     */
  logoImageUrl: "",

  /* ── 封面文字（顯示在圖片上方）── */
  coverTitle:    "思馬特",
  coverSubtitle: "訂 餐 系 統",

  /* ── 主題色（奶茶風預設，可以改色碼）──
     --color-primary   主要按鈕、強調色
     --color-secondary 次要色、淡底色
     --color-accent    標題、深色文字
     --color-bg        整體背景色
     --color-card      卡片背景                       */
  colors: {
    primary:   "#c07f4e",   /* 焦糖棕 */
    secondary: "#f5ede3",   /* 奶油米 */
    accent:    "#7a4f2e",   /* 深棕   */
    bg:        "#fdf8f3",   /* 米白底 */
    card:      "#ffffff",   /* 純白卡片 */
    success:   "#6a9e6e",   /* 草綠（正常）*/
    warning:   "#d4973a",   /* 蜂蜜橘（偏低）*/
    danger:    "#c05a5a",   /* 磚紅（不足）*/
  },

  /* ── 底部小字 ── */
  footerNote: "© 思馬特家教班",
};

/* ════════════════════════════════════════
   以下程式碼請勿修改
   ════════════════════════════════════════ */
</script>
<style id="theme-style">/* 由 JS 填入 */</style>
<style>
/* ══ BASE ══ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--accent); }

/* ══ ROUTER ══ */
#router { position: fixed; inset: 0; overflow: hidden; }
.page {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  background: var(--bg);
  padding-bottom: 90px;
  transform: translateX(100%);
  transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
  will-change: transform;
}
.page.active { transform: translateX(0); }
#page-login  { transform: translateX(0); }

/* ══ LOGIN PAGE ══ */
#page-login {
  display: flex; flex-direction: column;
  align-items: center; padding: 0 0 40px;
  min-height: 100%;
}

/* Cover photo area */
.cover-area {
  width: 100%; min-height: 220px;
  background: linear-gradient(135deg, var(--primary) 0%, #e8b88a 50%, #f5d9b8 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 24px 20px 28px;
  position: relative; overflow: hidden;
}
.cover-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  opacity: 0.55;
}
.cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(120,70,30,0.15) 0%, rgba(120,70,30,0.5) 100%);
}
.cover-logo {
  position: relative; z-index: 2;
  text-align: center;
}
.cover-logo img { height: 64px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
.cover-title    { font-size: 34px; font-weight: 900; color: #fff; text-shadow: 0 2px 12px rgba(0,0,0,0.25); letter-spacing: -0.01em; }
.cover-subtitle { font-size: 13px; color: rgba(255,255,255,0.88); letter-spacing: 0.14em; margin-top: 4px; }

/* Login card */
.login-wrap { width: 100%; max-width: 400px; padding: 24px 20px 0; }
.login-card {
  background: var(--card);
  border-radius: 24px;
  padding: 26px 22px;
  box-shadow: 0 4px 24px rgba(120,80,40,0.10);
  border: 1px solid var(--secondary);
}
.login-section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; text-align: center; color: var(--accent); }
.login-divider { display: flex; align-items: center; gap: 10px; color: var(--primary); font-size: 11px; margin: 18px 0; opacity: 0.6; }
.login-divider::before,.login-divider::after { content:''; flex:1; height:1px; background: var(--secondary); }

/* ══ HEADER ══ */
.header {
  background: var(--card);
  padding: 16px 18px 12px;
  border-bottom: 2px solid var(--secondary);
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 12px rgba(120,80,40,0.07);
}
.header-row { display: flex; justify-content: space-between; align-items: center; }
.header-logo { display: flex; align-items: center; gap: 10px; }
.header-logo img { height: 36px; border-radius: 8px; }
.header-logo-text { font-size: 16px; font-weight: 900; color: var(--primary); }
.header-logo-text small { display: block; font-size: 10px; font-weight: 400; color: var(--primary); opacity: 0.65; letter-spacing: 0.06em; }
.mode-badge { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
.mode-badge.admin { background: var(--secondary); color: var(--accent); }
.mode-badge.parent { background: #eef5ee; color: #4a7a4e; }

/* ══ FORMS ══ */
.form-group { margin-bottom: 12px; }
label { font-size: 10px; color: var(--primary); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 5px; }
input, textarea, select {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #e8d9cc; border-radius: 12px;
  font-size: 15px; font-family: 'Noto Sans TC',sans-serif;
  background: var(--bg); color: var(--accent); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(192,127,78,0.12);
}
select option { background: #fff; }
textarea { resize: vertical; min-height: 68px; }

.btn {
  display: block; width: 100%; padding: 13px;
  border-radius: 14px; font-size: 15px; font-weight: 700;
  font-family: 'Noto Sans TC',sans-serif;
  border: none; cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.97); opacity: 0.88; }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 3px 12px rgba(192,127,78,0.32); }
.btn-success { background: var(--success); color: #fff; box-shadow: 0 3px 12px rgba(106,158,110,0.28); }
.btn-danger  { background: var(--danger);  color: #fff; }
.btn-ghost   { background: transparent; border: 1.5px solid #e0cfc0; color: var(--primary); }
.btn-sm      { padding: 8px 13px; font-size: 12px; width: auto; display: inline-block; border-radius: 10px; }
.btn + .btn  { margin-top: 9px; }

/* ══ TABS ══ */
.tabs { display:flex; background: var(--card); border-bottom: 2px solid var(--secondary); overflow-x:auto; }
.tab {
  padding: 13px 18px; font-size: 13px; font-weight: 600;
  color: #b09080; border: none; background: none; cursor: pointer;
  border-bottom: 3px solid transparent; white-space: nowrap;
  font-family: 'Noto Sans TC',sans-serif; transition: all 0.18s;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ══ VIEWS ══ */
.view { display: none; padding: 14px; }
.view.active { display: block; }

/* ══ STATS ══ */
.stats-row { display:flex; gap:10px; margin:14px 0; }
.stat-card {
  flex:1; background: var(--card);
  border: 1px solid var(--secondary); border-radius: 16px; padding:14px;
  text-align:center; box-shadow: 0 2px 8px rgba(120,80,40,0.06);
}
.stat-val   { font-family:'DM Mono',monospace; font-size:20px; font-weight:500; color: var(--primary); }
.stat-label { font-size:10px; color:#b09080; margin-top:3px; }

/* ══ STUDENT CARDS ══ */
.student-card {
  background: var(--card); border: 1px solid var(--secondary);
  border-radius: 18px; padding: 16px; margin-bottom: 12px;
  cursor: pointer; transition: all 0.18s;
  box-shadow: 0 2px 10px rgba(120,80,40,0.06);
}
.student-card:active { transform: scale(0.98); }
.student-card:hover  { border-color: var(--primary); box-shadow: 0 4px 16px rgba(192,127,78,0.14); }
.student-name  { font-size: 17px; font-weight: 700; color: var(--accent); }
.student-note  { font-size: 12px; color: #b09080; margin-top: 2px; }
.balance-row   { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--secondary); display:flex; justify-content:space-between; align-items:flex-end; }
.balance-amount{ font-family:'DM Mono',monospace; font-size:24px; font-weight:500; }
.balance-label { font-size:10px; color:#b09080; letter-spacing:0.08em; text-transform:uppercase; margin-bottom:2px; }
.positive { color: var(--success); }
.warning  { color: var(--warning); }
.negative { color: var(--danger); }

.badge { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; }
.badge-ok     { background:#edf6ee; color: var(--success); border:1px solid #b8debb; }
.badge-warn   { background:#fef5e7; color: var(--warning); border:1px solid #f0d090; }
.badge-danger { background:#fdeaea; color: var(--danger);  border:1px solid #f0b8b8; }

/* ══ TX CARDS ══ */
.tx-card {
  background: var(--card); border: 1px solid var(--secondary);
  border-radius: 14px; padding: 13px 15px; margin-bottom: 8px;
  display:flex; align-items:center; gap:13px;
  box-shadow: 0 1px 6px rgba(120,80,40,0.05);
}
.tx-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.tx-icon.top-up { background: #edf6ee; }
.tx-icon.deduct { background: #fdeaea; }
.tx-info { flex:1; min-width:0; }
.tx-desc { font-size:14px; font-weight:600; color: var(--accent); }
.tx-date { font-size:11px; color:#b09080; font-family:'DM Mono',monospace; margin-top:2px; }
.tx-note { font-size:11px; color:#b09080; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-amount { font-family:'DM Mono',monospace; font-size:16px; font-weight:600; flex-shrink:0; }
.tx-amount.top-up { color: var(--success); }
.tx-amount.deduct { color: var(--danger); }

/* ══ DETAIL ══ */
.detail-header  { background:var(--card); border:1px solid var(--secondary); border-radius:18px; padding:18px; margin-bottom:13px; box-shadow:0 2px 10px rgba(120,80,40,0.06); }
.detail-name    { font-size:22px; font-weight:900; color: var(--accent); }
.detail-note    { font-size:13px; color:#b09080; margin-top:3px; }
.detail-balance { margin-top:14px; padding-top:14px; border-top:1px solid var(--secondary); }
.balance-big    { font-family:'DM Mono',monospace; font-size:40px; font-weight:500; }
.action-row     { display:flex; gap:10px; margin-bottom:13px; }
.action-row .btn{ flex:1; }
.section-title  { font-size:11px; letter-spacing:0.1em; color:#b09080; text-transform:uppercase; font-weight:700; margin:16px 0 9px; }
.back-btn       { display:flex; align-items:center; gap:6px; font-size:14px; color:var(--primary); background:none; border:none; cursor:pointer; padding:0; margin-bottom:14px; font-family:'Noto Sans TC',sans-serif; font-weight:600; }
.parent-code-box{ background:var(--secondary); border:1px solid #e0cfc0; border-radius:10px; padding:11px 14px; font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); text-align:center; word-break:break-all; }
.share-row      { display:flex; gap:8px; margin-top:10px; }
.share-row .btn { flex:1; font-size:12px; padding:9px 6px; }

/* ══ PARENT PAGE ══ */
.parent-hero {
  background: linear-gradient(135deg, var(--primary) 0%, #e8a870 100%);
  border-radius: 20px; padding: 24px 20px;
  text-align: center; margin: 14px 14px 0;
  box-shadow: 0 4px 20px rgba(192,127,78,0.28);
  color: #fff;
}
.parent-name      { font-size: 26px; font-weight: 900; }
.parent-bal-label { font-size: 10px; opacity: 0.82; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 14px; }
.parent-bal       { font-family:'DM Mono',monospace; font-size: 48px; font-weight: 500; line-height: 1.1; }
.parent-note      { font-size: 12px; opacity: 0.8; margin-top: 6px; }
.parent-bal.positive { color: #fff; }
.parent-bal.warning  { color: #ffe8a0; }
.parent-bal.negative { color: #ffb8b8; }

/* ══ MODAL ══ */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(80,40,10,0.4); z-index:200; align-items:flex-end; }
.modal-overlay.open { display:flex; }
.modal {
  background: var(--card); border-radius: 28px 28px 0 0;
  border-top: 3px solid var(--secondary);
  padding: 18px 20px 50px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.24s ease;
  box-shadow: 0 -4px 32px rgba(120,80,40,0.14);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px; height:4px; background:#e0cfc0; border-radius:2px; margin:0 auto 18px; }
.modal-title  { font-size:18px; font-weight:700; margin-bottom:18px; color: var(--accent); }

/* ══ MISC ══ */
.empty-state { text-align:center; padding:44px 20px; color:#c0a890; font-size:14px; }
.empty-icon  { font-size:44px; margin-bottom:10px; }
.error-box   { background:#fdeaea; border:1px solid #f0b8b8; border-radius:10px; padding:11px 13px; font-size:13px; color:var(--danger); margin-bottom:12px; }
.delete-link { background:none; border:none; color:var(--danger); font-size:12px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; opacity:0.7; padding:0; }
.footer-note { text-align:center; font-size:11px; color:#c0a890; padding:20px 0 8px; }

.fab {
  position:fixed; bottom:24px; right:20px;
  width:56px; height:56px; border-radius:50%;
  background: var(--primary); color:#fff;
  font-size:26px; font-weight:700; border:none; cursor:pointer;
  box-shadow: 0 4px 20px rgba(192,127,78,0.42);
  display:flex; align-items:center; justify-content:center;
  transition:transform 0.13s; z-index:50;
}
.fab:active { transform:scale(0.91); }
</style>
</head>
<body>
<div id="router">

<!-- ══ PAGE: LOGIN ══ -->
<div id="page-login" class="page active">

  <!-- Cover -->
  <div class="cover-area" id="cover-area">
    <div class="cover-bg" id="cover-bg"></div>
    <div class="cover-overlay"></div>
    <div class="cover-logo" id="cover-logo">
      <!-- logo img injected by JS if set -->
      <div class="cover-title"  id="cover-title"></div>
      <div class="cover-subtitle" id="cover-subtitle"></div>
    </div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div id="login-error" class="error-box" style="display:none"></div>

      <div class="login-section-title">👤 管理員登入</div>
      <div class="form-group">
        <label>管理員密碼</label>
        <input type="password" id="input-admin-pw" placeholder="請輸入密碼"
               onkeydown="if(event.key==='Enter')doAdminLogin()">
      </div>
      <button class="btn btn-primary" onclick="doAdminLogin()">進入管理後台 →</button>

      <div class="login-divider">或</div>

      <div class="login-section-title">🏠 家長餐費查詢</div>
      <div class="form-group">
        <label>家長專屬代碼</label>
        <input type="text" id="input-parent-code" placeholder="輸入老師給你的代碼"
               onkeydown="if(event.key==='Enter')doParentLogin()" autocapitalize="none">
      </div>
      <button class="btn btn-ghost" onclick="doParentLogin()">查詢孩子餐費 →</button>
    </div>

    <!-- 儲值說明卡片 -->
    <div style="background:var(--card);border:1.5px solid #e8d9cc;border-radius:20px;padding:20px 20px 18px;margin-top:16px;box-shadow:0 2px 10px rgba(120,80,40,0.07)">
      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px">
        💳 餐費儲值方式
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;background:var(--secondary);border-radius:10px;padding:10px 14px">
          <span style="font-size:12px;color:#b09080;font-weight:600">銀行</span>
          <span style="font-size:15px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace">中信 822</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;background:var(--secondary);border-radius:10px;padding:10px 14px">
          <span style="font-size:12px;color:#b09080;font-weight:600">帳號</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:15px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace">190540150003</span>
            <button onclick="copyText('190540150003','已複製帳號！')" style="background:var(--primary);color:#fff;border:none;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif">複製</button>
          </div>
        </div>
        <div style="background:#fff8f0;border:1px solid #f0d8b8;border-radius:10px;padding:10px 14px">
          <div style="font-size:12px;color:var(--warning);font-weight:700;margin-bottom:3px">📌 注意事項</div>
          <div style="font-size:12px;color:#9a6840;line-height:1.7">
            單次儲值以 <strong>$1,000</strong> 為單位<br>
            轉帳後請私訊末五碼
          </div>
        </div>
        <div style="background:#fdeaea;border:1px solid #f0b8b8;border-radius:10px;padding:10px 14px;margin-top:8px">
          <div style="font-size:12px;color:#c05a5a;font-weight:700;line-height:1.7">
            ⚠️ 餘額不足 $200 將寄信通知，若未儲值不予訂餐
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note" id="footer-note"></div>
  </div>
</div>

<!-- ══ PAGE: ADMIN ══ -->
<div id="page-admin" class="page">
  <div class="header">
    <div class="header-row">
      <div class="header-logo">
        <img id="admin-logo-img" src="" style="display:none">
        <div class="header-logo-text" id="admin-logo-text">
          載入中<small>管理後台</small>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="mode-badge admin">管理員</span>
        <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="padding:5px 10px">登出</button>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('students')">學生總覽</button>
    <button class="tab"        onclick="switchTab('log')">所有明細</button>
    <button class="tab"        onclick="switchTab('settings')">設定</button>
  </div>
  <div id="view-students" class="view active">
    <div id="admin-stats" class="stats-row"></div>
    <div id="student-list"></div>
  </div>
  <div id="view-log" class="view">
    <div id="all-log" style="margin-top:6px"></div>
  </div>
  <div id="view-settings" class="view">
    <div class="section-title">更改管理員密碼</div>
    <div class="detail-header">
      <div class="form-group"><label>新密碼</label><input type="password" id="new-pw" placeholder="輸入新密碼"></div>
      <div class="form-group"><label>確認新密碼</label><input type="password" id="confirm-pw" placeholder="再次輸入"></div>
      <button class="btn btn-primary" onclick="changePassword()">更改密碼</button>
    </div>
    <div class="section-title">說明</div>
    <div class="detail-header" style="font-size:13px;color:#b09080;line-height:1.9">
      每位學生有專屬代碼，進入學生詳情可複製代碼或連結給家長。<br>
      家長輸入代碼後只能查看自己孩子的資料，無法編輯任何內容。<br><br>
      想修改系統名稱、配色、封面圖片或 Logo，請用文字編輯器打開 HTML 檔案，修改最頂端的 <strong>CONFIG</strong> 區域。
    </div>
  </div>

// Firebase SDK (loaded via CDN in <head>)
let _db = null;
async function getDb() {
  if (_db) return _db;
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const { getFirestore, doc, getDoc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const app = initializeApp(firebaseConfig);
  _db = { fs: getFirestore(app), doc, getDoc, setDoc };
  return _db;
}

const KEYS = { students:'smart_students', txs:'smart_txs', pw:'smart_admin_pw' };
const FB_DOC = 'smartmeal/data'; // single document store

// Cache so we don't re-fetch everything on every small change
let _cache = null;

async function loadCloud() {
  try {
    const db = await getDb();
    const ref = db.doc(db.fs, 'smartmeal', 'data');
    const snap = await db.getDoc(ref);
    _cache = snap.exists() ? snap.data() : {};
    return _cache;
  } catch(e) {
    console.warn('Firebase read failed, using localStorage:', e);
    return null;
  }
}

async function saveCloud(data) {
  try {
    const db = await getDb();
    const ref = db.doc(db.fs, 'smartmeal', 'data');
    await db.setDoc(ref, data);
    _cache = data;
  } catch(e) {
    console.warn('Firebase write failed:', e);
  }
}

async function cGet(key) {
  if (!_cache) await loadCloud();
  if (_cache && _cache[key] !== undefined) return _cache[key];
return null;
}

async function cSet(key, val) {
  // update cache
  if (!_cache) _cache = {};
  _cache[key] = val;
  // save to localStorage as backup
  localStorage.setItem(key, JSON.stringify(val));
  // save full cache to Firebase
  await saveCloud(_cache);
}

let _cur = 'login';
function goTo(next) {
  if (next===_cur) return;
  const order=['login','admin','parent'];
  const fwd = order.indexOf(next) >= order.indexOf(_cur);
  const fromEl=document.getElementById('page-'+_cur);
  const toEl  =document.getElementById('page-'+next);
  toEl.style.transition='none';
  toEl.style.transform = fwd?'translateX(100%)':'translateX(-30%)';
  toEl.classList.add('active');
  void toEl.offsetWidth;
  const T='transform 0.32s cubic-bezier(0.32,0.72,0,1)';
  toEl.style.transition=T; toEl.style.transform='translateX(0)';
  fromEl.style.transition=T; fromEl.style.transform=fwd?'translateX(-30%)':'translateX(100%)';
  setTimeout(()=>{ fromEl.classList.remove('active'); fromEl.style.transition=''; },340);
  _cur=next;
}

function txCard(t,label,showDel) {
  const isTop=t.type==='top-up';

    ?`<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px"><div class="tx-amount ${t.type}">${isTop?'+':'-'}$${t.amount.toLocaleString()}</div><button class="delete-link" onclick="delTx('${t.id}')">刪除</button></div>`
    :`<div class="tx-amount ${t.type}">${isTop?'+':'-'}$${t.amount.toLocaleString()}</div>`;
  return `<div class="tx-card">
    <div class="tx-icon ${t.type}">${isTop?'💰':'🍽'}</div>
    <div class="tx-info">
      <div class="tx-desc">${label?label+' — ':''}${isTop?'儲值':'扣款（餐費）'}</div>
      <div class="tx-date">${fmtDate(t.date)}</div>
      ${t.note?`<div class="tx-note">${t.note}</div>`:''}

  if(txType==='deduct'){

function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el=>{ el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('open'); }); });
function copyText(text,msg){ navigator.clipboard.writeText(text).then(()=>alert(msg)).catch(()=>alert(text)); }

// ══ BOOT ══
async function init() {
  // Show loading overlay
  document.getElementById('loading-overlay').style.display = 'flex';

  try {
    // Load all data from cloud in one shot
    await loadCloud();
    S.students = (await cGet(KEYS.students)) || [];
    S.txs      = (await cGet(KEYS.txs))      || [];
    S.pw       = (await cGet(KEYS.pw))        || CONFIG.defaultPassword;
  } catch(e) {
    console.warn('Init error:', e);
    S.students = JSON.parse(localStorage.getItem(KEYS.students)||'[]');
    S.txs      = JSON.parse(localStorage.getItem(KEYS.txs)||'[]');
    S.pw       = localStorage.getItem(KEYS.pw) || CONFIG.defaultPassword;
  }

  document.getElementById('loading-overlay').style.display = 'none';

  const code = new URLSearchParams(window.location.search).get('code');
  if (code) {
    const st=S.students.find(s=>s.code===code.toLowerCase());
    if (st){ S.mode='parent'; S.sid=st.id; goTo('parent'); renderParent(st.id); return; }
  }
}
init();
</script>

<!-- Loading overlay -->
<div id="loading-overlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:36px">🍱</div>
  <div style="font-size:15px;font-weight:700;color:var(--primary)">連接雲端中…</div>
  <div style="width:48px;height:4px;background:#e8d9cc;border-radius:2px;overflow:hidden">
    <div style="height:100%;background:var(--primary);border-radius:2px;animation:loadbar 1.2s ease-in-out infinite"></div>
  </div>
</div>
<style>
@keyframes loadbar {
  0%   { width:0%;   margin-left:0; }
  50%  { width:80%;  margin-left:10%; }
  100% { width:0%;   margin-left:100%; }
}
</style>
